[[mods]]
modId="hollowknightmod"
version="${file.jarVersion}"
displayName="Hollow Knight Mod"
logoFile="old_nail.png"
logoBlur=false
credits="Hollow Knight was created by Team Cherry. Mod art and development by Kayk Caputo."
authors="Kayk Caputo"
description='''
An unofficial fan-made Minecraft Forge mod inspired by Hollow Knight.

Explore the world for naturally generated Pale Ore, forge new materials,
wield the Old Nail, wear the Knight armor set with 3D horns, and discover
other Hallownest-inspired content.

Encounter Crawtids and Tiktiks in caves and abandoned mines
throughout the Overworld. At night, these hostile creatures also emerge on
the surface of forest biomes.

Upgrade the Old Nail at an anvil into the Sharpened, Channelled, Coiled,
and Pure Nail. The upgrades consume 1, 1, 2, and 3 Pale Ingots and follow
the original damage progression of 5, 9, 13, 17, and 21. Because Geo is
not implemented, the first upgrade uses one Pale Ingot instead.
'''

[[dependencies.hollowknightmod]]
modId="forge"
mandatory=true
versionRange="[36.2.34,)"
ordering="NONE"
side="BOTH"

